<!-- Product Card — Garage Sale style
     data-product-id: unique product identifier
     data-category: filter category (furniture, electronics, clothing, etc.)
     data-buddy-pick: "true" to show Buddy's Pick badge breaking top-right corner
-->
<div class="product-card" data-product-id="{{product-id}}" data-category="{{category}}">
  <!-- Optional: Buddy's Pick badge — remove if not a featured pick -->
  <img src="assets/buddy/buddy-thumbs-up.png" alt="Buddy's Pick!" class="buddy-pick-badge">

  <!-- Image zone — swap emoji for real <img> tag when real photos available -->
  <div style="height:180px;background:linear-gradient(135deg,#DBEAFE,#93C5FD);display:flex;align-items:center;justify-content:center;border-bottom:3px solid var(--dark);font-size:3.5rem;border-radius:5px 5px 0 0;" data-slot-id="{{product-id}}-img">
    <!-- Replace with: <img src="path/to/photo.jpg" alt="{{title}}" style="width:100%;height:100%;object-fit:cover;border-radius:5px 5px 0 0;"> -->
    🛍️
  </div>

  <div class="product-card-body">
    <span class="product-condition">Available</span>
    <!-- Change to: <span class="product-condition sold">SOLD</span> for sold items -->

    <h3 style="font-weight:800;margin:0.4rem 0 0.2rem;" data-field-id="{{product-id}}-title">{{Product Title}}</h3>
    <p style="font-size:0.85rem;color:#6B7280;margin:0 0 0.5rem;" data-field-id="{{product-id}}-desc">{{Short description}}</p>

    <div style="display:flex;align-items:baseline;gap:0.5rem;">
      <div class="product-price" data-field-id="{{product-id}}-price">${{price}}</div>
      <!-- Optional: <span class="stage-was-price">${{original-price}}</span> -->
    </div>

    <!-- Optional tag badge -->
    <!-- <div style="margin-top:0.4rem;"><span class="tag-badge">{{tag}}</span></div> -->
  </div>
</div>

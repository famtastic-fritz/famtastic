# AGENT-CONTEXT.yaml — the single source of truth that orients every agent surface.
#
# This is the ONLY file a human edits for system_map / recall_path /
# reuse_before_generate. The `current_state` section is GENERATED by
# scripts/agents/emit-context.js and must not be hand-edited.
#
# The emitter renders this into per-surface artifacts:
#   - docs/agent-startup/AGENT-CONTEXT.generated.md  (full rendered manifest)
#   - AGENTS.md            (marker-bounded region — Codex/Cursor/Cowork/Shay sub-agents)
#   - GEMINI.md            (marker-bounded region — Gemini CLI)
#   - CLAUDE.md            (marker-bounded @-import line — Claude Code/Cowork)
#
# Marker discipline: generated content lives ONLY between
#   <!-- AGENT-CONTEXT:START --> ... <!-- AGENT-CONTEXT:END -->
# Everything outside the markers is human-owned and never touched.

system_map:
  identity: >-
    FAMtastic is Fritz's consolidated build ecosystem (site factory, idea capture,
    multi-agent workflow, admin) and Shay-Shay is his AI-Boss agent core. Every agent
    surface that works here is research-first, spec-shaped, proof-driven: reuse before
    generate, route specialized needs to the owning studio/service, record proof in
    Data Center, run post-evaluation after meaningful jobs.
  repos:
    - name: famtastic
      path: ~/famtastic
      role: one repo — site/idea/agent/admin factory
    - name: shay-shay
      path: ~/famtastic/shay-shay
      role: agent core — prompt_builder, gateway, tools, skills
    - name: shay-agent-os
      path: ~/famtastic/shay-agent-os
      role: swarm pipeline (dispatcher, brain chain, quality gates)
    - name: dot-shay
      path: ~/.shay
      role: runtime home — SOUL.md, kanban boards, cron, skills, gateway
  surfaces:
    - claude-code
    - codex
    - gemini-cli
    - cowork
    - shay-subagents

recall_path:
  before_acting:
    - Check .wolf/anatomy.md before reading files (know where things live).
    - Check .wolf/cerebrum.md Do-Not-Repeat before generating code.
    - Check .wolf/buglog.json before debugging a known issue.
    - Semantic recall — query the vault via the vault-semantic-search MCP (search_vault) or basic-memory.
  memory_homes:
    - name: vault-semantic-search
      kind: mcp
      tool: search_vault
      scope: Shay vault, on-device fastembed, no API key
    - name: basic-memory
      kind: mcp
      scope: shay-memory project (semantic search over the vault)
    - name: openwolf
      kind: files
      scope: .wolf/{anatomy,cerebrum,buglog}

reuse_before_generate:
  doctrine: >-
    Search and reuse before generating. Check the local skill catalog and installed
    hub skills first, then community discovery sources, then build only if no good
    match exists. Route specialized needs to the owning studio/service.
  discovery:
    - local skills catalog
    - agentskills.io hub
    - SkillNet (api-skillnet.openkg.cn/v1/search)
    - clawhub (clawhub.ai/api/v1/skills)

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAMtastic Site Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            studio: { bg: '#0f172a', panel: '#1e293b', accent: '#3b82f6', text: '#e2e8f0', muted: '#94a3b8' }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    #chat-messages::-webkit-scrollbar { width: 6px; }
    #chat-messages::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    .msg-user { background: #3b82f6; color: white; }
    .msg-assistant { background: #334155; color: #e2e8f0; }
    .msg-status { background: transparent; color: #94a3b8; font-style: italic; border: 1px dashed #475569; }
    .msg-error { background: #7f1d1d; color: #fca5a5; }
    .typing-indicator span { animation: blink 1.4s infinite both; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }
  </style>
</head>
<body class="bg-studio-bg text-studio-text h-screen flex flex-col overflow-hidden">

  <!-- Top bar -->
  <header class="bg-studio-panel border-b border-gray-700 px-6 py-3 flex items-center justify-between shrink-0">
    <div class="flex items-center gap-3">
      <h1 class="text-lg font-bold text-white">FAMtastic Site Studio</h1>
      <span id="site-tag" class="text-sm bg-studio-accent/20 text-studio-accent px-2 py-0.5 rounded">loading...</span>
    </div>
    <div class="flex items-center gap-4">
      <button onclick="rebuildSite()" class="text-sm bg-studio-accent hover:bg-blue-600 text-white px-4 py-1.5 rounded transition">Rebuild</button>
      <button onclick="togglePreview()" class="text-sm bg-gray-600 hover:bg-gray-500 text-white px-4 py-1.5 rounded transition">Toggle Preview</button>
    </div>
  </header>

  <!-- Asset bar (shown when assets exist) -->
  <div id="asset-bar" class="bg-studio-panel border-b border-gray-700 px-4 py-2 gap-2 items-center overflow-x-auto shrink-0" style="display: none;"></div>

  <!-- Main content: Chat + Preview -->
  <div class="flex flex-1 overflow-hidden">

    <!-- Chat Panel -->
    <div class="w-1/2 flex flex-col border-r border-gray-700">

      <!-- Messages -->
      <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-3">
        <div class="msg-assistant rounded-lg px-4 py-3 max-w-[90%]">
          Welcome to Site Studio! Describe the website you want to build, and I'll help you create it step by step.<br><br>
          Try: <em>"I'm building a site for my 30th class reunion"</em>
        </div>
      </div>

      <!-- Input -->
      <div class="p-4 border-t border-gray-700 bg-studio-panel">
        <form id="chat-form" class="flex gap-2">
          <input
            id="chat-input"
            type="text"
            placeholder="Describe what you want..."
            autocomplete="off"
            class="flex-1 bg-studio-bg border border-gray-600 rounded-lg px-4 py-2.5 text-studio-text placeholder-studio-muted focus:outline-none focus:border-studio-accent"
          >
          <button type="submit" class="bg-studio-accent hover:bg-blue-600 text-white px-6 py-2.5 rounded-lg font-medium transition">Send</button>
        </form>
      </div>
    </div>

    <!-- Preview Panel -->
    <div id="preview-panel" class="w-1/2 flex flex-col bg-white">
      <div class="bg-gray-100 border-b px-4 py-2 flex items-center justify-between shrink-0">
        <span class="text-gray-600 text-sm font-medium">Live Preview</span>
        <div class="flex items-center gap-2">
          <span id="preview-status" class="text-xs text-gray-400">connecting...</span>
          <button onclick="reloadPreview()" class="text-xs bg-gray-200 hover:bg-gray-300 text-gray-700 px-2 py-1 rounded transition">Refresh</button>
        </div>
      </div>
      <iframe id="preview-frame" class="flex-1 w-full" src="about:blank"></iframe>
    </div>
  </div>

  <script>
    // --- State ---
    let ws = null;
    let config = {};
    let previewVisible = true;
    let streamBuffer = '';

    // --- Init ---
    async function init() {
      config = await (await fetch('/api/config')).json();
      document.getElementById('site-tag').textContent = config.tag;
      document.title = `Site Studio — ${config.tag}`;

      // Load conversation history
      const history = await (await fetch('/api/history')).json();
      history.forEach(msg => addMessage(msg.role, msg.content, false));

      // Set preview URL
      const frame = document.getElementById('preview-frame');
      frame.src = `http://localhost:${config.previewPort}/`;
      document.getElementById('preview-status').textContent = `localhost:${config.previewPort}`;

      // Load assets bar
      refreshAssetBar();

      // Connect WebSocket
      connectWS();
    }

    function connectWS() {
      ws = new WebSocket(`ws://localhost:${config.studioPort}`);
      ws.onopen = () => console.log('[ws] connected');
      ws.onclose = () => {
        console.log('[ws] disconnected, reconnecting...');
        setTimeout(connectWS, 2000);
      };
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        switch (msg.type) {
          case 'assistant':
            flushStream();
            addMessage('assistant', msg.content);
            break;
          case 'status':
            addMessage('status', msg.content);
            break;
          case 'error':
            addMessage('error', msg.content);
            break;
          case 'stream':
            streamBuffer += msg.content;
            break;
          case 'reload-preview':
            reloadPreview();
            break;
          case 'asset-created':
            addAssetPreview(msg.filename, msg.path);
            break;
          case 'spec-updated':
            addMessage('status', 'Spec updated');
            break;
        }
      };
    }

    function flushStream() {
      if (streamBuffer.trim()) {
        // Stream was raw output, the final assistant message replaces it
        streamBuffer = '';
      }
    }

    // --- Chat ---
    document.getElementById('chat-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

      addMessage('user', text);
      ws.send(JSON.stringify({ type: 'chat', content: text }));
      input.value = '';
      showTyping();
    });

    function addMessage(role, content, scroll = true) {
      hideTyping();
      const container = document.getElementById('chat-messages');
      const div = document.createElement('div');
      const cls = role === 'user' ? 'msg-user ml-auto' :
                  role === 'status' ? 'msg-status' :
                  role === 'error' ? 'msg-error' : 'msg-assistant';
      div.className = `${cls} rounded-lg px-4 py-3 max-w-[90%] text-sm whitespace-pre-wrap`;
      div.textContent = content;
      container.appendChild(div);
      if (scroll) container.scrollTop = container.scrollHeight;
    }

    function showTyping() {
      hideTyping();
      const container = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.id = 'typing';
      div.className = 'msg-assistant rounded-lg px-4 py-3 max-w-[90%] typing-indicator';
      div.innerHTML = '<span>.</span><span>.</span><span>.</span>';
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    // --- Asset Preview ---
    function addAssetPreview(filename, assetPath) {
      hideTyping();
      const container = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = 'msg-assistant rounded-lg px-4 py-3 max-w-[90%]';

      const isSvg = filename.endsWith('.svg');
      div.innerHTML = `
        <div class="text-sm mb-2 font-medium">Asset created: ${filename}</div>
        <div class="bg-white rounded-lg p-4 inline-block border border-gray-600" style="max-width: 300px;">
          ${isSvg
            ? `<img src="/site-assets/${filename}?t=${Date.now()}" alt="${filename}" class="max-w-full h-auto" style="max-height: 200px;" />`
            : `<img src="/site-assets/${filename}?t=${Date.now()}" alt="${filename}" class="max-w-full h-auto" style="max-height: 200px;" />`
          }
        </div>
        <div class="mt-2 text-xs text-studio-muted">
          Say "make it more playful" or "change the colors" to refine
        </div>
      `;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;

      // Also refresh asset list
      refreshAssetBar();
    }

    async function refreshAssetBar() {
      try {
        const assets = await (await fetch('/api/assets')).json();
        const bar = document.getElementById('asset-bar');
        if (!assets.length) { bar.style.display = 'none'; return; }
        bar.style.display = 'flex';
        bar.innerHTML = assets.map(a => `
          <div class="shrink-0 bg-white rounded p-1 cursor-pointer hover:ring-2 hover:ring-studio-accent"
               onclick="viewAsset('${a.name}')" title="${a.name}">
            <img src="/site-assets/${a.name}?t=${Date.now()}" alt="${a.name}" class="h-8 w-auto" />
          </div>
        `).join('');
      } catch {}
    }

    function viewAsset(name) {
      addMessage('status', `Viewing: ${name}`);
      // Could open in preview panel or modal
    }

    // --- Preview ---
    function reloadPreview() {
      const frame = document.getElementById('preview-frame');
      frame.src = frame.src;
    }

    function togglePreview() {
      const panel = document.getElementById('preview-panel');
      previewVisible = !previewVisible;
      panel.style.display = previewVisible ? 'flex' : 'none';
      // Adjust chat width
      panel.previousElementSibling.style.width = previewVisible ? '50%' : '100%';
    }

    // --- Actions ---
    function rebuildSite() {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      addMessage('user', 'Build the site');
      ws.send(JSON.stringify({ type: 'chat', content: 'build the site' }));
      showTyping();
    }

    // --- Start ---
    init();
  </script>
</body>
</html>

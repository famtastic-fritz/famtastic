<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Studio Shell Compare — index.html ↔ workbench-foundation.html</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    *,*::before,*::after { box-sizing: border-box; }
    html,body { margin:0; height:100%; background:#08080A; color:#F2EFE8; font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { display:grid; grid-template-rows: auto 1fr; }
    header {
      background: #0C0C10;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 10px 16px;
      display:flex; gap:16px; align-items:center;
      font-size: 13px;
    }
    header .title { font-weight: 600; letter-spacing: 0.02em; }
    header .meta { color: rgba(242,239,232,0.55); font-size:11.5px; }
    header .spacer { flex: 1; }
    header a { color:#F5C46B; text-decoration: none; padding: 4px 10px; border:1px solid rgba(245,196,107,0.3); border-radius:6px; font-size:11.5px; transition: background 0.15s; }
    header a:hover { background: rgba(245,196,107,0.08); }
    header label { display:inline-flex; gap:6px; align-items:center; cursor:pointer; user-select:none; font-size:11.5px; color: rgba(242,239,232,0.7); }
    header input[type=checkbox] { accent-color: #F5C46B; }

    main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 8px;
      overflow: hidden;
      min-height: 0;
    }
    main.stacked { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }

    .pane {
      display:grid; grid-template-rows: auto 1fr;
      background:#0C0C10;
      border:1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      overflow:hidden;
      min-height: 0;
    }
    .pane h2 {
      margin:0; padding:8px 12px;
      font-size: 12px; font-weight: 600;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display:flex; gap:10px; align-items:center;
    }
    .pane h2 .badge {
      font-size: 10px; padding: 2px 8px; border-radius: 999px;
      background: rgba(245,196,107,0.15); color:#F5C46B;
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    .pane h2 .badge.cool { background: rgba(111,224,210,0.12); color:#6FE0D2; }
    .pane h2 .url {
      font-size: 11px; color: rgba(242,239,232,0.55);
      font-family: 'JetBrains Mono', monospace;
      margin-left:auto;
    }
    .pane h2 .pop { color:#F5C46B; padding: 2px 8px; border:1px solid rgba(245,196,107,0.3); border-radius: 4px; text-decoration:none; font-size:10.5px; margin-left:8px; }
    .pane h2 .pop:hover { background: rgba(245,196,107,0.08); }
    .pane iframe {
      width: 100%; height: 100%; border: 0; display:block;
      background:#000;
    }
  </style>
</head>
<body>
  <header>
    <span class="title">Studio Shell Compare</span>
    <span class="meta">side-by-side, read-only — see <code>docs/STUDIO-SHELL-RECONCILIATION-2026-05-05.md</code> for the per-entry verdict</span>
    <span class="spacer"></span>
    <label><input type="checkbox" id="stack" /> stack vertically</label>
    <a href="/" target="_blank" rel="noopener">open / (index.html)</a>
    <a href="/workbench-foundation.html" target="_blank" rel="noopener">open foundation</a>
  </header>
  <main id="grid">
    <section class="pane">
      <h2>
        <span>index.html</span>
        <span class="badge">working shell</span>
        <span class="url">/</span>
        <a class="pop" href="/" target="_blank" rel="noopener">pop ↗</a>
      </h2>
      <iframe src="/" title="index.html — working Studio shell"></iframe>
    </section>
    <section class="pane">
      <h2>
        <span>workbench-foundation.html</span>
        <span class="badge cool">canonical foundation</span>
        <span class="url">/workbench-foundation.html</span>
        <a class="pop" href="/workbench-foundation.html" target="_blank" rel="noopener">pop ↗</a>
      </h2>
      <iframe src="/workbench-foundation.html" title="workbench-foundation.html — canonical Foundation shell"></iframe>
    </section>
  </main>
  <script>
    document.getElementById('stack').addEventListener('change', (e) => {
      document.getElementById('grid').classList.toggle('stacked', e.target.checked);
    });
  </script>
</body>
</html>

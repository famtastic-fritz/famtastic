<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Shay · Arc</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; background: #0b1220; color: #e2e8f0;
         font: 15px/1.5 -apple-system, system-ui, sans-serif; padding: env(safe-area-inset-top) 0 0; }
  header { position: sticky; top: 0; background: #111a2e; padding: 14px 16px;
           border-bottom: 1px solid #25324a; display: flex; align-items: center; gap: 10px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #38bdf8; box-shadow: 0 0 8px #38bdf8;
         animation: pulse 1.6s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  h1 { font-size: 16px; margin: 0; font-weight: 600; }
  .phase { margin-left: auto; font-size: 13px; color: #38bdf8; font-weight: 600; }
  ul { list-style: none; margin: 0; padding: 8px 0 40px; }
  li { padding: 9px 16px; border-bottom: 1px solid #1a2436; display: flex; gap: 10px; }
  .t { color: #64748b; font-variant-numeric: tabular-nums; flex: none; }
  .ph { color: #fbbf24; font-weight: 600; flex: none; min-width: 46px; }
  .msg { color: #cbd5e1; word-break: break-word; }
  .DONE .ph, .msg:has(+ .DONE) { color: #34d399; }
  .meta { padding: 8px 16px; color: #64748b; font-size: 12px; }
</style>
</head>
<body>
<header><span class="dot"></span><h1>Shay · all-night arc</h1><span class="phase" id="phase">…</span></header>
<div class="meta" id="meta">connecting…</div>
<ul id="feed"></ul>
<script>
  const k = new URLSearchParams(location.search).get("k") || "";
  async function tick() {
    try {
      const r = await fetch(`/api/arc?k=${encodeURIComponent(k)}`, { headers: { "X-Shay-Token": k } });
      const d = await r.json();
      document.getElementById("phase").textContent = d.phase || "—";
      const ev = (d.events || []).slice().reverse();
      document.getElementById("feed").innerHTML = ev.map(e =>
        `<li class="${(e.msg||'').startsWith('DONE')?'DONE':''}">
           <span class="t">${e.t||''}</span>
           <span class="ph">${e.phase||''}</span>
           <span class="msg">${(e.msg||'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]))}</span>
         </li>`).join("");
      document.getElementById("meta").textContent =
        `${ev.length} events · updated ${new Date().toLocaleTimeString()}`;
    } catch (e) {
      document.getElementById("meta").textContent = "offline — retrying… " + e;
    }
  }
  tick(); setInterval(tick, 4000);
</script>
</body>
</html>

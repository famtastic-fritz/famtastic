            - generic [ref=e93]: "Welcome back! Session #2 for site-auntie-gale-garage-sales."
            - generic [ref=e194]: "I'm building a site for Auntie Gale's Garage Sales. She sells random household items, vintage finds, collectibles, clothing, and electronics — inventory changes frequently. Think Facebook Marketplace vibe but as a standalone branded site. BRAND CHARACTER: \"Buddy\" — a modern cartoon woodpecker mascot (like a fresh 2026 take on Woody Woodpecker but legally distinct — different colors, stocky round body, red-orange crest). He wears a little sales apron and holds a megaphone. He's the enthusiastic salesman character who appears throughout the site. COLOR SCHEME: Primary #E8420A (bold red-orange), Secondary #1D4ED8 (deep blue), Accent #FBBF24 (golden yellow for starbursts/badges), Background #FFFBF5 (warm cream), Dark #1C1917. FONTS: Bangers (display/badges/starbursts), Nunito 800 (headings), Nunito 400 (body). Use Google Fonts CDN. PAGES NEEDED: 1. Home (index.html) — video hero with Buddy peeking from edge + speech bubble \"New deals every week!\", featured items carousel placeholder, \"Buddy's Picks\" section with 3 product cards, testimonials, newsletter signup 2. Shop (shop.html) — product grid 3-col with category filter tabs (All, Furniture, Vintage, Electronics, Clothing, Books), each card has image+title+price+condition badge 3. About (about.html) — Auntie Gale's story, why she sells, Buddy's origin story section 4. Deals (deals.html) — \"Daily Deal\" showcase display (bold frame, one featured item), Flash Sales section with starburst price badges, Hours & Location 5. Contact (contact.html) — location+hours, phone (904) 555-GALE, social media links, \"I'm Looking For\" request form FAMtastic DESIGN REQUIREMENTS — this is NON-NEGOTIABLE: - Cards with icons/elements that BREAK PAST the card border (overflow: visible, negative margin technique) - At least 3 starburst shapes visible on home page (CSS clip-path polygon, yellow #FBBF24) - Wavy SVG divider between hero and featured section (not a straight line) - Diagonal stripe pattern on the Deals page background - Bold display divs with thick borders and background color — designed as \"stages\" where content is swappable - Nothing should look generic. Every section must have a deliberate bold design choice. - Use the word FAMtastic energy in design — fearless, bold, boundary-breaking DATA ATTRIBUTES: All sections need data-section-id, data-section-type. All editable fields need data-field-id, data-field-type. All images need data-slot-id, data-slot-status=\"empty\", data-slot-role. Include data-card-enhanced on all product cards. Include data-animate=\"fade-up\" on cards and sections."

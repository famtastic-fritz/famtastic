              - generic [ref=f1e11]:
                - heading "Where It All Began" [level=2] [ref=f1e12]
                - paragraph [ref=f1e14]: The Street family's story spans generations, rooted in tradition, resilience, and an unwavering commitment to keeping loved ones close. From humble beginnings to thriving communities, our family has built a legacy of character, warmth, and enduring bonds. This website honors that heritage and celebrates the remarkable individuals who came before us and those who carry our name forward.
                - generic [ref=f1e15]:
                  - generic [ref=f1e16]:
                    - heading "Our Heritage" [level=3] [ref=f1e17]
                    - paragraph [ref=f1e18]: Deep roots connect us to ancestors who built homes, raised families, and contributed to their communities with pride and purpose. We honor their memory by staying connected and preserving their stories for generations to come.
                  - generic [ref=f1e19]:
                    - heading "Our Values" [level=3] [ref=f1e20]
                    - paragraph [ref=f1e21]: Family first. Integrity always. Connection everywhere. These principles guide us as we celebrate reunions, preserve genealogy, and create new memories while honoring the wisdom of our ancestors.
              - generic [ref=f1e23]:
                - heading "Generational Milestones" [level=2] [ref=f1e24]
                - generic [ref=f1e26]:
                  - generic [ref=f1e27]:
                    - heading "The Founding Generation (1920s–1960s)" [level=3] [ref=f1e28]
                    - paragraph [ref=f1e29]: Our ancestors arrived with determination and built the foundation of family values that persist today. They established homes, created businesses, and nurtured tight-knit communities rooted in faith and hard work.
                  - generic [ref=f1e30]:
                    - heading "The Bridge Generation (1960s–1990s)" [level=3] [ref=f1e31]
                    - paragraph [ref=f1e32]: Growing up in a changing world, this generation honored traditions while embracing new opportunities. They raised families with pride, pursued education and careers, and expanded the Street family network across cities and states.
                  - generic [ref=f1e33]:
                    - heading "Today's Generation (1990s–present)" [level=3] [ref=f1e34]
                    - paragraph [ref=f1e35]: We are connected by technology and passion for family history. Through reunions, genealogy research, and shared memories, we celebrate our heritage while building new traditions for the next generation.

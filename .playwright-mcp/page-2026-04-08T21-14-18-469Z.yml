      - generic [ref=e68]: The Official Mascot
      - heading "Meet Buddy" [level=2] [ref=e69]
      - paragraph [ref=e70]: Buddy the woodpecker showed up at my first garage sale in 2010 — a real one. He was hammering away at the oak tree in the backyard the whole day, and every time a customer made a great find, he'd let out this enormous knock-knock-knock like he was celebrating with us.
      - paragraph [ref=e71]: My niece drew him on a piece of cardboard as a sign that day. He's been our mascot ever since. Enthusiastic, persistent, and absolutely certain that the best stuff is always worth a little more effort to find.

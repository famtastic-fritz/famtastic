      - generic [ref=e33]: In Her Own Words
      - heading "How It All Started" [level=2] [ref=e34]
      - generic [ref=e35]:
        - paragraph [ref=e36]: "\"I started going to estate sales with my mother when I was seven years old. She had this gift — she could walk into a crowded, chaotic sale and immediately spot the one thing worth buying. I thought it was magic."
        - paragraph [ref=e37]: Turns out it's not magic. It's 40 years of knowing what things are worth, what they're made of, and whether they'll hold up. I've been doing this professionally since 2010, and I still feel that same little thrill every Saturday morning when I open the doors."
        - paragraph [ref=e38]: Everything I sell is personally inspected. If it's marked Available, it works. If it's marked as-is, I'll tell you exactly what's wrong. I don't sell junk — I sell the good stuff that other people didn't know was good.
      - generic [ref=e39]: — Auntie Gale

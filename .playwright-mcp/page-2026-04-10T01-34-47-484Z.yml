ern on the Deals page background - Bold display divs with thick borders and background color — designed as \"stages\" where content is swappable - Nothing should look generic. Every section must have a deliberate bold design choice. - Use the word FAMtastic energy in design — fearless, bold, boundary-breaking DATA ATTRIBUTES: All sections need data-section-id, data-section-type. All editable fields need data-field-id, data-field-type. All images need data-slot-id, data-slot-status=\"empty\", data-slot-role. Include data-card-enhanced on all product cards. Include data-animate=\"fade-up\" on cards and sections."

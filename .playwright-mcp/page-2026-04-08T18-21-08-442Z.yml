            - generic [ref=e120]: "Welcome back! Session #2 for site-auntie-gale-garage-sales. Pages: index.html, about.html, contact.html, deals.html, shop.html (viewing: index.html) Design brief: approved"
            - generic [ref=e221]: "Buddy's white backgrounds have just been removed — all 8 images are now transparent PNGs. I analyzed each image's bounding box and here are the exact CSS fixes needed. Please update main.css and the relevant HTML files: 1. .buddy-peek-right (index.html hero): Character has 175px of transparent RIGHT padding (17% of frame). At the current display size this pushes the character ~80px away from the viewport edge. Change right:0 to right:-80px so Buddy actually hugs the right side. Also update .buddy-speech-bubble from right:220px to right:300px to follow the shift. 2. .buddy-pick-badge (main.css): Increase from width:64px;height:64px to width:90px;height:90px and top:-22px;right:-22px. Character fills nearly 100% of frame height so 90px will look much bolder. 3. .buddy-wave-footer (index.html): Character has 166px of top transparent padding. At height:120px that's ~19px of invisible space above the character. Change top:-90px to top:-72px so Buddy doesn't float above the footer border. 4. Add filter:drop-shadow(2px 4px 8px rgba(0,0,0,0.25)) to all Buddy images placed on colored section backgrounds so they pop — specifically: buddy-peek-right on hero, buddy-full-body on about blue hero, buddy-pop-up on shop red hero, buddy-sale-sign on both display stages. 5. buddy-peek-left in contact.html has 351px of empty RIGHT space (34% of frame). At height:80px that's ~27px of dead air. Move it to left:-3.5rem to pull it further into view. Please make all of these changes surgically — edit main.css for the class-level changes and the specific HTML files for the inline positioning."

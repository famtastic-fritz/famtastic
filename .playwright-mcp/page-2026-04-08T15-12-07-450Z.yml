    - heading "Where It All Began" [level=2] [ref=e18]
    - paragraph [ref=e20]: The Street family's story spans generations, rooted in tradition, resilience, and an unwavering commitment to keeping loved ones close. From humble beginnings to thriving communities, our family has built a legacy of character, warmth, and enduring bonds. This website honors that heritage and celebrates the remarkable individuals who came before us and those who carry our name forward.
    - generic [ref=e21]:
      - generic [ref=e22]:
        - heading "Our Heritage" [level=3] [ref=e23]
        - paragraph [ref=e24]: Deep roots connect us to ancestors who built homes, raised families, and contributed to their communities with pride and purpose. We honor their memory by staying connected and preserving their stories for generations to come.
      - generic [ref=e25]:
        - heading "Our Values" [level=3] [ref=e26]
        - paragraph [ref=e27]: Family first. Integrity always. Connection everywhere. These principles guide us as we celebrate reunions, preserve genealogy, and create new memories while honoring the wisdom of our ancestors.

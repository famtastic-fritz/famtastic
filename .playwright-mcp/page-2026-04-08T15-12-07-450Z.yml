        - heading "The Founding Generation (1920s–1960s)" [level=3] [ref=e34]
        - paragraph [ref=e35]: Our ancestors arrived with determination and built the foundation of family values that persist today. They established homes, created businesses, and nurtured tight-knit communities rooted in faith and hard work.
      - generic [ref=e36]:
        - heading "The Bridge Generation (1960s–1990s)" [level=3] [ref=e37]
        - paragraph [ref=e38]: Growing up in a changing world, this generation honored traditions while embracing new opportunities. They raised families with pride, pursued education and careers, and expanded the Street family network across cities and states.
      - generic [ref=e39]:
        - heading "Today's Generation (1990s–present)" [level=3] [ref=e40]
        - paragraph [ref=e41]: We are connected by technology and passion for family history. Through reunions, genealogy research, and shared memories, we celebrate our heritage while building new traditions for the next generation.

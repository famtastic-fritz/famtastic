e\": \"/images/lawn-after-1.jpg\", \"caption\": \"...\" } ] } ``` For schema markup, embed this as JSON-LD in your HTML pages—no extra database needed. Migration path: Phase 1 (now): Static + Netlify Forms. You manually track leads. Phase 2 (when quotes scale): Spin up a simple backend (Netlify Functions or a small Node server) + PostgreSQL. Store quote requests there instead of email. Add a basic admin dashboard to track leads and follow-ups. Integrate with your CRM (HubSpot, Pipedrive, etc.) via API."

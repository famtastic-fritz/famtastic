            - generic [ref=e115]: "I'm building a family reunion website called The Street Family Reunion. Purpose: Connect family members, preserve family history, and sell a PDF bloodline book ($24.99) to fund reunions and continued genealogy research. Color scheme: - Heritage Gold #C8A96E (primary accent — CTAs, headings) - Warm Mahogany #6B3A2A (section backgrounds, cards) - Cream Ivory #FFF8F0 (text on dark, light backgrounds) - Deep Root Brown #2C1810 (nav, footer, hero overlay) - Moss Green #4A6741 (nature accents, badges) - Sunset Amber #E8A84C (highlights, hover states) Fonts: - Heading: Playfair Display (serif, heritage/prestige) - Body: Source Sans 3 (sans-serif, warm/readable) - Accent: Cormorant Garamond italic (elegant quotes/testimonials) Pages (5): 1. Home — Video hero background, parallax oak tree section, upcoming reunion teaser, 6 activity cards with hover states, family testimonials, book purchase CTA 2. Our History — Family timeline, bloodline book section with cover image and PayPal buy button, historical photos, contribute research CTA 3. Connect — Family member search, upload old photos with drag-drop, ways to contribute, contact form 4. Reunion 2026 — Event banner, schedule, RSVP/tickets via PayPal, location map, accommodations 5. Gallery — Photo grid by decade, old photos slideshow with JS transitions, upload CTA Design requirements: - Parallax scrolling on homepage with large oak tree background - Video hero using imported component (already in library) - Card hover states with shadow lift and slight scale - 3 fonts minimum (heading, body, accent) - Warm, inviting, heritage feel — family, roots, legacy - Responsive mobile-first design I have these assets ready: - Hero video still and MP4 in assets/video/ - Parallax background (oak tree) in assets/images/parallax-bg.jpg - Book cover in assets/images/book-cover.jpg - 6 activity card images in assets/images/cards/ - Icon set in assets/icons/"

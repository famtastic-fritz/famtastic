px;background:linear-gradient(135deg,#FEE2E2,#FCA5A5);display:flex;align-items:center;justify-content:center;border-bottom:3px solid var(--dark);font-size:3.5rem;border-radius:5px 5px 0 0;\">📷</div> <div class=\"product-card-body\"> <span class=\"product-condition\">Available</span> <h3 style=\"font-weight:800;margin:0.4rem 0 0.2rem;\" data-field-id=\"pick-2-title\">Canon AE-1 Film Camera</h3> <p style=\"font-size:0.85rem;color:#6B7280;margin:0 0 0.5rem;\" data-field-id=\"pick-2-desc\">With 50mm lens, tested and working</p> <div class=\"product-price\" data-field-id=\"pick-2-price\">$95</div> </div> </div> <div class=\"product-card\" data-product-id=\"pick-3\" data-buddy-pick=\"true\"> <img data-slot-id=\"auto-index-gallery-buddy-3\" data-slot-role=\"gallery\" data-slot-status=\"stock\" src=\"assets/buddy/buddy-thumbs-up.png\" alt=\"Buddy's Pick!\" class=\"buddy-pick-badge\"> <div style=\"height:180px;background:linear-gradient(135deg,#DCFCE7,#86EFAC);display:flex;align-items:center;justify-content:center;border-bottom:3px solid var(--dark);font-size:3.5rem;border-radius:5px 5px 0 0;\">🏺</div> <div class=\"product-card-body\"> <span class=\"product-condition\">Available</span> <h3 style=\"font-weight:800;margin:0.4rem 0 0.2rem;\" data-field-id=\"pick-3-title\">Hand-Thrown Pottery Set</h3> <p style=\"font-size:0.85rem;color:#6B7280;margin:0 0 0.5rem;\" data-field-id=\"pick-3-desc\">4-piece mug set, local artisan</p> <div class=\"product-price\" data-field-id=\"pick-3-price\">$40</div> </div> </div> <div class=\"product-card\" data-product-id=\"pick-4\" data-buddy-pick=\"true\"> <img data-slot-id=\"auto-index-gallery-buddy-4\" data-slot-role=\"gallery\" data-slot-status=\"stock\" src=\"assets/buddy/buddy-thumbs-up.png\" alt=\"Buddy's Pick!\" class=\"buddy-pick-badge\"> <div style=\"height:180px;background:linear-gradient(135deg,#FEF9C3,#FDE047);display:flex;align-items:center;justify-content:center;border-bottom:3px solid var(--dark);font-size:3.5rem;border-radius:5px
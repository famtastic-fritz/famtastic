r:3px solid var(--dark);border-radius:6px;font-size:5rem;\" data-slot-id=\"deal-image\">🧵</div> </div> <div> <div style=\"margin-bottom:0.5rem;\"><span class=\"stage-was-price\" data-field-id=\"deal-was-price\">Was $220</span></div> <div class=\"stage-price\" data-field-id=\"deal-price\">$95</div> <p style=\"font-size:0.95rem;color:#4B5563;margin:0.75rem 0;\" data-field-id=\"deal-description\"> 1950s Singer Featherweight 221, recently serviced and oiled. Comes with original case and 12 bobbins. A collector's dream. </p> <span class=\"product-condition\" style=\"display:inline-block;margin-bottom:1rem;\">Available</span><br> <a href=\"contact.html\" class=\"btn-primary\" data-field-id=\"deal-cta\">Claim This Deal →</a> </div> </div> </div> </div> </section> <!-- ═══════════════════════ MEET AUNTIE GALE ════════════════════ --> <section style=\"padding:4rem 0;background:var(--bg);\" data-section-id=\"meet-auntie-gale\"> <div style=\"max-width:1200px;margin:0 auto;padding:0 1.5rem;\"> <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:center;\"> <div> <img src=\"data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7\" alt=\"Auntie Gale\" style=\"width:100%;max-width:400px;border:3px solid var(--dark);border-radius:8px;\" data-slot-id=\"auntie-gale-character\" data-slot-status=\"empty\" data-slot-role=\"character\"> </div> <div> <div class=\"section-label\">Meet the Treasure Master</div> <h2 class=\"section-title\" data-field-id=\"gale-intro-heading\">Auntie Gale's Story</h2> <p style=\"font-size:1.05rem;color:#374151;margin:1rem 0;\" data-field-id=\"gale-story-p1\"> I've been hunting treasures for 30 years—first for myself, then for everyone. What started as weekend garage sale runs became a mission: prove that the best stuff isn't sold in big-box stores. It's sitting in someone's attic, waiting for YOU. </p> <p style=\"font-size:1.05rem;color:#374151;margin:1rem 0;\" data-field-id=\"gale-story-p2\"> Every item on my lot has been tested, loved, and priced fair. No junk, no guesses. Just honest deals on things that matter. </p> <a href=\"about.html\" class=\"btn-secondary\" style=\"margin-top:1.5rem;\" data-field-id=\"gale-cta\">Read My Full Story →</a> </div> </div> </div> </section> <!-- ═══════════════════════ TESTIMONIALS ═════════════════════════ --> <section class=\"testimonials-section\" style=\"padding:4rem 0;\" data-section-id=\"testimonials\"> <div style=\"max-width:1200px;margin:0 auto;padding:0 1.5rem;\"> <div style=\"text-align:center;margin-bottom:2.5rem;\"> <div class=\"section-label\">Happy Customers</div> <h2 class=\"section-title\" data-field-id=\"testimonials-title\">Real People, Real Deals</h2> </div> <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem;\"> <div class=\"testimonial-card\" data-testimonial-id=\"t1\"> <div class=\"testimonial-stars\">★★★★★</div> <p style=\"margin:1rem 0 0.75rem;font-size:1rem;\" data-field-id=\"t1-text\">\"Found a set of cast iron pans for $12. My daughter thought I was crazy stopping — I proved her wrong the moment we got home!\"</p> <div style=\"font-weight:800;font-size:0.9rem;\" data-field-id=\"t1-name\">— Maureen T., Lakewood</div> </div> <div class=\"testimonial-card\" data-testimonial-id=\"t2\"> <div class=\"testimonial-stars\">★★★★★</div> <p style=\"margin:1rem 0 0.75rem;font-size:1rem;\" data-field-id=\"t2-text\">\"Gale knows her stuff! She told me the lamp I was eyeing was a genuine McCoy piece. Got it for $18. Listed for $140 at the antique mall.\"</p> <div style=\"font-weight:800;font-size:0.9rem;\" data-field-id=\"t2-name\">— Dennis R., Denver</div> </div> <div class=\"testimonial-card\" data-testimonial-id=\"t3\"> <div class=\"testimonial-stars\">★★★★★</div> <p style=\"margin:1rem 0 0.75rem;font-size:1rem;\" data-field-id=\"t3-text\">\"I've been shopping with Auntie Gale for 3 years. She tests everything before selling it. You know exactly what you're getting.\"</p> <div styl
name: Deploy Agent Business OS

# Deploys agent-business-os/ (static site + /api lead function) to Azure
# Static Web Apps. Inert until the AZURE_STATIC_WEB_APPS_API_TOKEN_ABOS secret
# and an Azure SWA resource exist — see agent-business-os/README.md.

on:
  push:
    branches: [main]
    paths:
      - 'agent-business-os/**'
      - '.github/workflows/azure-static-web-apps-agent-business-os.yml'
  workflow_dispatch:

jobs:
  build_and_deploy:
    if: ${{ vars.ABOS_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ABOS }}
          action: upload
          app_location: 'agent-business-os/dist'
          api_location: 'agent-business-os/api'
          output_location: ''
          skip_app_build: true

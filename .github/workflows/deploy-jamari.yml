name: Deploy Jamari site to Pages

on:
  push:
    branches: [claude/jamari-graduation-portfolio-8yEPP]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./sites/site-jamari-graduation/dist
          publish_branch: gh-pages
          force_orphan: true

      - name: Enable GitHub Pages (gh-pages branch, root)
        run: |
          repo="${{ github.repository }}"
          auth="Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}"
          accept="Accept: application/vnd.github+json"
          body='{"source":{"branch":"gh-pages","path":"/"}}'
          echo "Creating Pages site..."
          code=$(curl -sS -o /tmp/p.json -w "%{http_code}" -X POST -H "$auth" -H "$accept" \
            "https://api.github.com/repos/$repo/pages" -d "$body" || true)
          echo "POST -> $code"; cat /tmp/p.json || true
          if [ "$code" != "201" ] && [ "$code" != "409" ]; then
            echo "Trying PUT (update existing source)..."
            curl -sS -X PUT -H "$auth" -H "$accept" \
              "https://api.github.com/repos/$repo/pages" -d "$body" || true
          fi
          echo "Final Pages config:"
          curl -sS -H "$auth" -H "$accept" "https://api.github.com/repos/$repo/pages" || true
